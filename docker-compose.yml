services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: delta-v-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus-persister:
    build:
      context: .
      args:
        VERSION: dev
    container_name: delta-v-prometheus-persister
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REMOTE_WRITE_URL: ${REMOTE_WRITE_URL:-http://host.docker.internal:9090/api/v1/write}
    ports:
      - "8000:8000"       # Prometheus /metrics endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
