schema: spec-driven

context: |
  Mermaid diagram style guide (apply to all diagrams):
  - Direction: top-to-bottom (TB) for flowcharts, left-to-right (LR) for architecture
  - Keep diagrams simple: max 8-10 nodes. Split into multiple if larger.
  - Use clear, plain-language labels (not technical IDs)
  - Use subgraphs to group related components
  - Rounded boxes for user actions, rectangles for system components
  - Dotted lines (-.->) for optional/async flows, solid lines (-->) for primary flows
  - Diagrams should align to WCAG 2.1 AA standards for accessibility
  - Diagrams should be clear and readable in dark or light mode
  
  Git workflow: atomic commits per task

rules:
  proposal:
    - Include a Mermaid flowchart showing the high-level user flow or system interaction
    - After creating a proposal, commit and push all change artifacts before continuing to the next artifact
  design:
    - Include Mermaid diagrams to illustrate architecture and data flow
    - Use sequence diagrams for API/service interactions
    - Use flowcharts for user flows and decision logic
    - Include a Deployment section with setup steps
  tasks:
    - Always include a Documentation task group at the end
    - Documentation tasks should cover README updates, API docs, and setup guides
    - Each task must be a single atomic commit
    - Commit and push after each completed task checkbox
    - Use conventional commit format