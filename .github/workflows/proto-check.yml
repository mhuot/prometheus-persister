name: Proto Contract Check

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-proto-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Fetch latest proto files from delta-v
        run: |
          curl -sf -o proto/sink-message.proto \
            "https://raw.githubusercontent.com/mhuot/delta-v/develop/core/ipc/sink/common/src/main/proto/sink-message.proto"
          curl -sf -o proto/collectionset.proto \
            "https://raw.githubusercontent.com/mhuot/delta-v/develop/features/kafka/producer/src/main/proto/collectionset.proto"

      - name: Regenerate protobuf bindings
        run: make proto

      - name: Run tests against updated protos
        id: tests
        run: pytest --tb=short 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Check for existing issue
        if: steps.tests.outcome == 'failure'
        id: existing
        run: |
          count=$(gh issue list --search "Proto contract break detected in delta-v" --state open --json number --jq 'length')
          echo "exists=$( [ "$count" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on contract break
        if: steps.tests.outcome == 'failure' && steps.existing.outputs.exists == 'false'
        run: |
          gh issue create \
            --title "Proto contract break detected in delta-v" \
            --body "$(cat <<'ISSUE_EOF'
          ## Proto Contract Break

          The weekly proto contract check detected that the latest Delta-V proto files
          break the prometheus-persister test suite.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Test Output
          ```
          $(tail -50 test-output.txt)
          ```

          ### Next Steps
          1. Review the Delta-V proto changes
          2. Update `proto/` files and regenerate bindings (`make proto`)
          3. Fix any broken transformer/consumer code
          4. Run tests locally to verify: `pytest`
          ISSUE_EOF
          )" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
